version: "3.9"

networks:
  app-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  ceph_data:

services:

  # ─── PostgreSQL ────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secret}
      POSTGRES_DB: ${POSTGRES_DB:-appdb}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-admin} -d ${POSTGRES_DB:-appdb}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis ─────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-secret} --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-secret}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Ceph (single-node demo via ceph/daemon) ───────────────────
  ceph-mon:
    image: ceph/daemon:latest
    container_name: ceph-mon
    restart: unless-stopped
    environment:
      CEPH_DAEMON: MON
      MON_IP: 127.0.0.1
      CEPH_PUBLIC_NETWORK: 0.0.0.0/0
      CEPH_CLUSTER_NETWORK: 0.0.0.0/0
    volumes:
      - ceph_data:/var/lib/ceph
      - /etc/ceph:/etc/ceph
    networks:
      - app-network

  ceph-osd:
    image: ceph/daemon:latest
    container_name: ceph-osd
    restart: unless-stopped
    privileged: true
    environment:
      CEPH_DAEMON: OSD_CEPH_DISK_ACTIVATE
    volumes:
      - ceph_data:/var/lib/ceph
      - /etc/ceph:/etc/ceph
      - /dev:/dev
    depends_on:
      - ceph-mon
    networks:
      - app-network

  ceph-rgw:
    image: ceph/daemon:latest
    container_name: ceph-rgw
    restart: unless-stopped
    environment:
      CEPH_DAEMON: RGW
    volumes:
      - ceph_data:/var/lib/ceph
      - /etc/ceph:/etc/ceph
    ports:
      - "7480:7480"          # S3-compatible API
    depends_on:
      - ceph-mon
      - ceph-osd
    networks:
      - app-network

  # ─── FastAPI ───────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fastapi
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-admin}:${POSTGRES_PASSWORD:-secret}@postgres:5432/${POSTGRES_DB:-appdb}
      REDIS_URL: redis://:${REDIS_PASSWORD:-secret}@redis:6379/0
      CEPH_RGW_URL: http://ceph-rgw:7480
      SECRET_KEY: ${SECRET_KEY:-changeme}
    ports:
      - "8000:8000"
    networks:
      - app-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    # Пример команды запуска — замените на свою если нужно
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # ─── React (Nginx) ─────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: react
    restart: unless-stopped
    ports:
      - "3000:80"
    networks:
      - app-network
    depends_on:
      - backend